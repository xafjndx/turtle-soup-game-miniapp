<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海龟汤管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .sidebar { min-height: 100vh; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; }
  </style>
</head>
<body class="bg-gray-100">
  <!-- 登录页面 -->
  <div id="loginPage" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-6">🐢 海龟汤管理后台</h1>
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">管理员密码</label>
          <input type="password" id="adminPassword" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="请输入管理员密码">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">登录</button>
      </form>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="mainPage" class="hidden">
    <div class="flex">
      <!-- 侧边栏 -->
      <div class="sidebar w-64 bg-indigo-900 text-white p-6">
        <h1 class="text-xl font-bold mb-8">🐢 管理后台</h1>
        <nav>
          <a href="#" data-page="dashboard" class="block py-2 px-4 rounded hover:bg-indigo-800 mb-2 active">📊 数据概览</a>
          <a href="#" data-page="questions" class="block py-2 px-4 rounded hover:bg-indigo-800 mb-2">📝 题目管理</a>
          <a href="#" data-page="crawler" class="block py-2 px-4 rounded hover:bg-indigo-800 mb-2">🕷️ 爬虫管理</a>
          <a href="#" data-page="logs" class="block py-2 px-4 rounded hover:bg-indigo-800 mb-2">📋 操作日志</a>
        </nav>
        <div class="mt-8 pt-8 border-t border-indigo-700">
          <button id="logoutBtn" class="text-indigo-300 hover:text-white">退出登录</button>
        </div>
      </div>

      <!-- 内容区域 -->
      <div class="flex-1 p-8">
        <!-- 数据概览 -->
        <div id="dashboardPage" class="page">
          <h2 class="text-2xl font-bold mb-6">数据概览</h2>
          <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="card bg-white p-6 rounded-xl shadow">
              <div class="text-3xl font-bold text-indigo-600" id="statUsers">-</div>
              <div class="text-gray-500 mt-2">总用户数</div>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow">
              <div class="text-3xl font-bold text-green-600" id="statQuestions">-</div>
              <div class="text-gray-500 mt-2">题目总数</div>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow">
              <div class="text-3xl font-bold text-blue-600" id="statGames">-</div>
              <div class="text-gray-500 mt-2">游戏总数</div>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow">
              <div class="text-3xl font-bold text-purple-600" id="statWinRate">-</div>
              <div class="text-gray-500 mt-2">平均命中率</div>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow">
              <h3 class="text-lg font-bold mb-4">题目分类统计</h3>
              <div id="categoryStats" class="space-y-3"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
              <h3 class="text-lg font-bold mb-4">题目来源统计</h3>
              <div id="sourceStats" class="space-y-3"></div>
            </div>
          </div>
        </div>

        <!-- 题目管理 -->
        <div id="questionsPage" class="page hidden">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">题目管理</h2>
            <div class="flex gap-4">
              <select id="filterCategory" class="px-4 py-2 border rounded-lg">
                <option value="">全部分类</option>
                <option value="CLASSIC">经典推理</option>
                <option value="HORROR">恐怖悬疑</option>
                <option value="LOGIC">逻辑陷阱</option>
                <option value="WARM">温情反转</option>
              </select>
              <select id="filterStatus" class="px-4 py-2 border rounded-lg">
                <option value="">全部状态</option>
                <option value="APPROVED">已通过</option>
                <option value="PENDING">待审核</option>
                <option value="SOFT_DELETED">已删除</option>
              </select>
              <input type="text" id="searchKeyword" placeholder="搜索题目..." class="px-4 py-2 border rounded-lg">
            </div>
          </div>

          <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">
                    <input type="checkbox" id="selectAll">
                  </th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">汤面</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">分类</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">来源</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">状态</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">游玩次数</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">操作</th>
                </tr>
              </thead>
              <tbody id="questionsList" class="divide-y divide-gray-200"></tbody>
            </table>
          </div>

          <div class="mt-4 flex justify-between items-center">
            <div class="text-gray-500">
              共 <span id="totalQuestions">0</span> 条记录
            </div>
            <div class="flex gap-2">
              <button id="prevPage" class="px-4 py-2 border rounded-lg hover:bg-gray-50">上一页</button>
              <span id="pageInfo" class="px-4 py-2">第 1 页</span>
              <button id="nextPage" class="px-4 py-2 border rounded-lg hover:bg-gray-50">下一页</button>
            </div>
          </div>
        </div>

        <!-- 爬虫管理 -->
        <div id="crawlerPage" class="page hidden">
          <h2 class="text-2xl font-bold mb-6">爬虫管理</h2>
          
          <div class="bg-white p-6 rounded-xl shadow mb-6">
            <h3 class="text-lg font-bold mb-4">手动触发爬虫</h3>
            <p class="text-gray-500 mb-4">立即执行一次爬虫任务，从贴吧等平台抓取新题目。</p>
            <button id="triggerCrawler" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
              🕷️ 开始抓取
            </button>
            <div id="crawlerStatus" class="mt-4 text-gray-500"></div>
          </div>

          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-lg font-bold mb-4">爬虫配置</h3>
            <div class="space-y-4">
              <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                <div>
                  <div class="font-medium">贴吧 - 海龟汤吧</div>
                  <div class="text-sm text-gray-500">tieba.baidu.com</div>
                </div>
                <span class="badge badge-success">已启用</span>
              </div>
              <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                <div>
                  <div class="font-medium">小红书</div>
                  <div class="text-sm text-gray-500">xiaohongshu.com</div>
                </div>
                <span class="badge badge-warning">待配置</span>
              </div>
              <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                <div>
                  <div class="font-medium">剧本杀论坛</div>
                  <div class="text-sm text-gray-500">jubensha.com</div>
                </div>
                <span class="badge badge-warning">待配置</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 操作日志 -->
        <div id="logsPage" class="page hidden">
          <h2 class="text-2xl font-bold mb-6">操作日志</h2>
          <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">时间</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">操作</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">对象</th>
                  <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">详情</th>
                </tr>
              </thead>
              <tbody id="logsList" class="divide-y divide-gray-200"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 模态框 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 class="text-lg font-bold mb-4" id="modalTitle">提示</h3>
      <div id="modalBody"></div>
      <div class="mt-6 flex justify-end gap-2">
        <button id="modalCancel" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
        <button id="modalConfirm" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">确认</button>
      </div>
    </div>
  </div>

  <script>
    // API 基础地址
    const API_BASE = 'http://localhost:3000/api';
    let token = localStorage.getItem('adminToken');
    let currentPage = 1;
    let pageSize = 20;

    // 工具函数
    async function request(url, options = {}) {
      const res = await fetch(API_BASE + url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': token ? `Bearer ${token}` : '',
          ...options.headers,
        },
      });
      const data = await res.json();
      if (data.code !== 0) throw new Error(data.message);
      return data.data;
    }

    // 显示模态框
    function showModal(title, body, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modal').classList.add('active');
      document.getElementById('modalConfirm').onclick = () => {
        onConfirm();
        document.getElementById('modal').classList.remove('active');
      };
    }

    document.getElementById('modalCancel').onclick = () => {
      document.getElementById('modal').classList.remove('active');
    };

    // 登录
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const password = document.getElementById('adminPassword').value;
      try {
        await request('/admin/login', {
          method: 'POST',
          body: JSON.stringify({ password }),
        });
        localStorage.setItem('adminToken', 'admin-logged-in');
        showMainPage();
      } catch (err) {
        alert('登录失败: ' + err.message);
      }
    };

    // 退出登录
    document.getElementById('logoutBtn').onclick = () => {
      localStorage.removeItem('adminToken');
      location.reload();
    };

    // 显示主界面
    function showMainPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
      loadDashboard();
    }

    // 切换页面
    document.querySelectorAll('[data-page]').forEach(link => {
      link.onclick = (e) => {
        e.preventDefault();
        const page = link.dataset.page;
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(page + 'Page').classList.remove('hidden');
        document.querySelectorAll('[data-page]').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        
        if (page === 'dashboard') loadDashboard();
        if (page === 'questions') loadQuestions();
        if (page === 'logs') loadLogs();
      };
    });

    // 加载统计数据
    async function loadDashboard() {
      try {
        const stats = await request('/admin/statistics');
        document.getElementById('statUsers').textContent = stats.users.total;
        document.getElementById('statQuestions').textContent = stats.questions.total;
        document.getElementById('statGames').textContent = stats.games.total;
        document.getElementById('statWinRate').textContent = stats.games.winRate + '%';

        // 分类统计
        const categoryNames = { CLASSIC: '经典推理', HORROR: '恐怖悬疑', LOGIC: '逻辑陷阱', WARM: '温情反转' };
        const categoryHtml = Object.entries(stats.questions.byCategory).map(([k, v]) => `
          <div class="flex justify-between">
            <span>${categoryNames[k] || k}</span>
            <span class="font-bold">${v}</span>
          </div>
        `).join('');
        document.getElementById('categoryStats').innerHTML = categoryHtml;

        // 来源统计
        const sourceNames = { PLATFORM: '平台预设', CRAWLER: '爬虫抓取', AI_GENERATED: 'AI生成' };
        const sourceHtml = Object.entries(stats.questions.bySource).map(([k, v]) => `
          <div class="flex justify-between">
            <span>${sourceNames[k] || k}</span>
            <span class="font-bold">${v}</span>
          </div>
        `).join('');
        document.getElementById('sourceStats').innerHTML = sourceHtml;
      } catch (err) {
        console.error('加载统计数据失败:', err);
      }
    }

    // 加载题目列表
    async function loadQuestions(page = 1) {
      try {
        const category = document.getElementById('filterCategory').value;
        const status = document.getElementById('filterStatus').value;
        const keyword = document.getElementById('searchKeyword').value;
        
        const params = new URLSearchParams({ page, pageSize });
        if (category) params.append('category', category);
        if (status) params.append('status', status);
        if (keyword) params.append('keyword', keyword);

        const result = await request('/admin/questions?' + params);
        
        const categoryNames = { CLASSIC: '经典', HORROR: '恐怖', LOGIC: '逻辑', WARM: '温情' };
        const sourceNames = { PLATFORM: '平台', CRAWLER: '爬虫', AI_GENERATED: 'AI' };
        const statusNames = { APPROVED: '已通过', PENDING: '待审核', SOFT_DELETED: '已删除' };
        const statusClasses = { APPROVED: 'badge-success', PENDING: 'badge-warning', SOFT_DELETED: 'badge-danger' };

        const html = result.list.map(q => `
          <tr>
            <td class="px-6 py-4"><input type="checkbox" class="question-checkbox" data-id="${q.id}"></td>
            <td class="px-6 py-4">
              <div class="text-sm font-medium text-gray-900">${q.surface.substring(0, 50)}...</div>
            </td>
            <td class="px-6 py-4"><span class="badge badge-info">${categoryNames[q.category]}</span></td>
            <td class="px-6 py-4">${sourceNames[q.source]}</td>
            <td class="px-6 py-4"><span class="badge ${statusClasses[q.status]}">${statusNames[q.status]}</span></td>
            <td class="px-6 py-4">${q.playCount}</td>
            <td class="px-6 py-4">
              <button onclick="editQuestion('${q.id}')" class="text-indigo-600 hover:text-indigo-900 mr-2">编辑</button>
              <button onclick="deleteQuestion('${q.id}')" class="text-red-600 hover:text-red-900">删除</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('questionsList').innerHTML = html;
        document.getElementById('totalQuestions').textContent = result.total;
        document.getElementById('pageInfo').textContent = `第 ${page} 页`;
        currentPage = page;
      } catch (err) {
        console.error('加载题目列表失败:', err);
      }
    }

    // 删除题目
    window.deleteQuestion = (id) => {
      showModal('确认删除', '<p>确定要删除这个题目吗？</p>', async () => {
        try {
          await request('/admin/questions/delete', {
            method: 'POST',
            body: JSON.stringify({ ids: [id], hard: false }),
          });
          loadQuestions(currentPage);
        } catch (err) {
          alert('删除失败: ' + err.message);
        }
      });
    };

    // 加载操作日志
    async function loadLogs() {
      try {
        const result = await request('/admin/logs');
        const html = result.list.map(log => `
          <tr>
            <td class="px-6 py-4 text-sm text-gray-500">${new Date(log.createdAt).toLocaleString()}</td>
            <td class="px-6 py-4">${log.action}</td>
            <td class="px-6 py-4">${log.target || '-'}</td>
            <td class="px-6 py-4 text-sm text-gray-500">${log.detail ? JSON.stringify(log.detail) : '-'}</td>
          </tr>
        `).join('');
        document.getElementById('logsList').innerHTML = html;
      } catch (err) {
        console.error('加载日志失败:', err);
      }
    }

    // 触发爬虫
    document.getElementById('triggerCrawler').onclick = async () => {
      try {
        document.getElementById('crawlerStatus').textContent = '爬虫任务已启动，请稍后刷新查看结果...';
        await request('/admin/crawler/trigger', { method: 'POST' });
      } catch (err) {
        document.getElementById('crawlerStatus').textContent = '启动失败: ' + err.message;
      }
    };

    // 搜索和筛选
    document.getElementById('filterCategory').onchange = () => loadQuestions(1);
    document.getElementById('filterStatus').onchange = () => loadQuestions(1);
    document.getElementById('searchKeyword').onkeypress = (e) => {
      if (e.key === 'Enter') loadQuestions(1);
    };

    // 分页
    document.getElementById('prevPage').onclick = () => {
      if (currentPage > 1) loadQuestions(currentPage - 1);
    };
    document.getElementById('nextPage').onclick = () => {
      loadQuestions(currentPage + 1);
    };

    // 初始化
    if (token) {
      showMainPage();
    }
  </script>
</body>
</html>
