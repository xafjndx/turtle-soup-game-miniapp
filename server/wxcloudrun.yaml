# 微信云托管配置文件
# 参考：https://developers.weixin.qq.com/miniprogram/dev/wxcloudrun/src/quickstart/custom/

# 服务配置
service:
  # 服务名称
  name: turtle-soup-server
  # 服务描述
  description: 海龟汤游戏后端服务

# 容器配置
container:
  # 容器端口
  port: 80
  # CPU 限制 (核)
  cpu: 0.5
  # 内存限制 (MB)
  mem: 512
  # 最小实例数
  minNum: 0
  # 最大实例数
  maxNum: 10
  # 环境变量
  envVars:
    - name: NODE_ENV
      value: production
    - name: DATABASE_URL
      value: ${DATABASE_URL}
    - name: JWT_SECRET
      value: ${JWT_SECRET}
    - name: WECHAT_APPID
      value: ${WECHAT_APPID}
    - name: WECHAT_SECRET
      value: ${WECHAT_SECRET}
    - name: ALIBABA_DASHSCOPE_API_KEY
      value: ${ALIBABA_DASHSCOPE_API_KEY}